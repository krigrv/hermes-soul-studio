<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#f59e0b" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#0a0a0a" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="letter" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fde047"/>
      <stop offset="45%" stop-color="#fbbf24"/>
      <stop offset="80%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#b45309"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#0a0a0a"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <!-- Tag chip -->
  <g transform="translate(80,90)">
    <rect x="0" y="0" width="370" height="44" rx="22" fill="#1a1102" stroke="#f59e0b" stroke-opacity="0.55"/>
    <text x="185" y="29" text-anchor="middle" font-family="-apple-system, Segoe UI, Inter, sans-serif" font-size="16" font-weight="700" fill="#fbbf24" letter-spacing="2">
      LOCAL-FIRST OPERATOR SETUP · 5 STEPS
    </text>
  </g>

  <!-- HERMES — chunky pixel-style title -->
  <g transform="translate(80,200)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="900" letter-spacing="6" fill="url(#letter)">
    <text x="0" y="160" font-size="200">HERMES</text>
  </g>
  <!-- subtle outline echo (under) -->
  <g transform="translate(86,206)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-weight="900" letter-spacing="6" fill="none" stroke="#78350f" stroke-width="2" opacity="0.7">
    <text x="0" y="160" font-size="200">HERMES</text>
  </g>

  <!-- Tagline -->
  <text x="80" y="450" font-family="-apple-system, Segoe UI, Inter, sans-serif" font-size="40" font-weight="600" fill="#fafafa">
    Build the OS for your AI operator.
  </text>

  <!-- Sub bullets -->
  <g transform="translate(80,510)" font-family="-apple-system, Segoe UI, Inter, sans-serif" font-size="22" fill="#a3a3a3">
    <text x="0" y="0">Soul · Brains · Skills · Handoffs · Approval gates · Backups</text>
    <text x="0" y="38">Five short steps. Local-first. No login. No cloud.</text>
  </g>

  <!-- Bottom-right brand mark (mini H) -->
  <g transform="translate(1020,420)">
    <rect x="0" y="0" width="120" height="120" rx="20" fill="#0a0a0a" stroke="#f59e0b" stroke-opacity="0.4"/>
    <g fill="url(#letter)">
      <rect x="22" y="22" width="20" height="76"/>
      <rect x="78" y="22" width="20" height="76"/>
      <rect x="42" y="50" width="36" height="20"/>
    </g>
  </g>
</svg>
